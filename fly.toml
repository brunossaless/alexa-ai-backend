# Renomeie o app ao criar: fly apps create alexa-ai-backend-seu-nome
app = 'alexa-ai-backend'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '3000'
  ALEXA_VERIFY_SIGNATURE = 'true'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
