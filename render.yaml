# Blueprint: Render Dashboard → New → Blueprint → conectar repositório
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: alexa-ai-backend
    runtime: docker
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '3000'
      - key: ALEXA_VERIFY_SIGNATURE
        value: 'true'
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOWED_ALEXA_USER_IDS
        sync: false
